services:
  - type: web
    name: cv-generator
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        scope: run
      - key: DB_USER
        scope: run
      - key: DB_PASSWORD
        scope: run
      - key: DB_NAME
        scope: run
      - key: PORT
        value: 10000
