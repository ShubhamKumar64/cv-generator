databases:
  - name: cv-db
    databaseName: cv
    plan: free

services:
  - type: web
    name: cv-generator
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cv-db
          property: connectionString
      - key: PORT
        value: 10000
